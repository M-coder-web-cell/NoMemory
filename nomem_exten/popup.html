<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 200px;
      font-family: Arial, sans-serif;
      margin: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    button {
      background-color: #2563eb;
      color: white;
      border: none;
      padding: 8px 12px;
      font-size: 14px;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #1d4ed8;
    }
    #status {
      font-size: 12px;
      color: #6b7280;
      text-align: center;
    }
  </style>
</head>
<body>
  <button id="extract-btn">Extract Raw HTML</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
